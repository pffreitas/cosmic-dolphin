name: Deploy Mobile (Internal Builds)

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/api-client/**"
      - "packages/apispec/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-mobile.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.2.20"

jobs:
  quality:
    name: Mobile Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint mobile app
        run: bun run --cwd apps/mobile lint

      - name: Run mobile tests
        run: bun run --cwd apps/mobile test -- --ci

  build-internal:
    name: Build Internal (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Trigger EAS preview build
        id: eas_build
        working-directory: apps/mobile
        run: |
          BUILD_JSON=$(eas build \
            --platform "${{ matrix.platform }}" \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json)

          echo "$BUILD_JSON"

          BUILD_ID=$(echo "$BUILD_JSON" | node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(0,"utf8")); const payload=Array.isArray(data)?data[0]:data; process.stdout.write(payload?.id ?? "");')
          BUILD_URL=$(echo "$BUILD_JSON" | node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(0,"utf8")); const payload=Array.isArray(data)?data[0]:data; const url=payload?.buildDetailsPageUrl ?? payload?.artifacts?.buildUrl ?? ""; process.stdout.write(url);')

          if [ -z "$BUILD_ID" ]; then
            echo "Failed to parse EAS build ID from CLI output."
            exit 1
          fi

          if [ -z "$BUILD_URL" ]; then
            BUILD_URL="https://expo.dev/accounts/cosmic-dolphin/projects/cosmic-dolphin/builds/$BUILD_ID"
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Publish build link in job summary
        run: |
          echo "### Internal build (${{ matrix.platform }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build ID: \`${{ steps.eas_build.outputs.build_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.eas_build.outputs.build_url }}" >> "$GITHUB_STEP_SUMMARY"
